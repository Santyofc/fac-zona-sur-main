version: "3.9"

services:
  # ─── Frontend (Nuxt 3 Dashboard) ─────────────────────────────
  frontend:
    build:
      context: ./apps/dashboard
      dockerfile: ../../infra/docker/frontend.Dockerfile
    container_name: factura-cr-frontend
    ports:
      - "3000:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=http://backend:8000
      - NUXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NUXT_PUBLIC_SUPABASE_KEY=${SUPABASE_ANON_KEY}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - fcr-network

  # ─── Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./services/api
      dockerfile: ../../infra/docker/backend.Dockerfile
    container_name: factura-cr-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - JWT_SECRET=${JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - HACIENDA_API_URL=${HACIENDA_API_URL}
      - HACIENDA_TOKEN_URL=${HACIENDA_TOKEN_URL}
      - HACIENDA_CLIENT_ID=${HACIENDA_CLIENT_ID}
      - HACIENDA_CLIENT_SECRET=${HACIENDA_CLIENT_SECRET}
      - HACIENDA_USERNAME=${HACIENDA_USERNAME}
      - HACIENDA_PASSWORD=${HACIENDA_PASSWORD}
      - APP_ENV=production
    depends_on:
      - redis
    volumes:
      - ./certs:/app/certs:ro
      - pdf-storage:/tmp
    restart: unless-stopped
    networks:
      - fcr-network

  # ─── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: ./services/api
      dockerfile: ../../infra/docker/worker.Dockerfile
    container_name: factura-cr-worker
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - HACIENDA_API_URL=${HACIENDA_API_URL}
      - HACIENDA_TOKEN_URL=${HACIENDA_TOKEN_URL}
      - HACIENDA_CLIENT_ID=${HACIENDA_CLIENT_ID}
      - HACIENDA_CLIENT_SECRET=${HACIENDA_CLIENT_SECRET}
    depends_on:
      - redis
      - backend
    volumes:
      - ./certs:/app/certs:ro
      - pdf-storage:/tmp
    restart: unless-stopped
    networks:
      - fcr-network

  # ─── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: factura-cr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped
    networks:
      - fcr-network

  # ─── Nginx (Reverse Proxy) ────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: factura-cr-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - fcr-network

volumes:
  redis-data:
  pdf-storage:
  nginx-logs:

networks:
  fcr-network:
    driver: bridge
